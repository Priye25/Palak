<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Palak ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #1a001f, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

/* Bigger Card */
.card {
    width: 90%;
    max-width: 550px;   /* Increased */
    padding: 40px;      /* Increased */
    border-radius: 30px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(25px);
    text-align: center;
    box-shadow: 0 0 60px rgba(255, 46, 138, 0.4);
}

/* Bigger Heading */
h1 {
    font-size: 2.8em;
    margin-bottom: 15px;
}

/* Bigger text */
#typing {
    font-size: 1.3em;
    margin: 20px 0;
    min-height: 70px;
}

/* Buttons */
button {
    padding: 14px 30px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(45deg, #ff2e8a, #ff7eb3);
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 1em;
    margin: 10px;
}

/* Music Button */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: white;
    color: #ff2e8a;
}

/* Popup */
.popup {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    height: 65%;
    background: rgba(0,0,0,0.95);
    border-radius: 30px 30px 0 0;
    padding: 30px;
    text-align: center;
    transition: 0.6s;
}

.popup.active {
    bottom: 0;
}

.popup p {
    font-size: 1.3em;
    line-height: 1.6;
}

/* Hearts */
.heart {
    position: absolute;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Mobile tweak */
@media (max-width: 500px) {
    h1 { font-size: 2em; }
    #typing { font-size: 1.1em; }
}
</style>
</head>

<body>

<div class="card">
    <h1>Hi Palak, Mera Bachha ❤️</h1>
    <p id="typing"></p>
    <button onclick="startExperience()"> Click Here Babu💖</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
    <p>
        You are the finest, loveliest, and most beautiful soul I’ve ever known… and honestly, even those words fall short of what you truly are to me ❤️
    </p>
</div>

<!-- Music Button -->
<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<!-- Audio -->
<audio id="heartbeat">
    <source src="Heartbeat.mp3" type="audio/mpeg">
</audio>

<audio id="bgMusic" loop>
    <source src="Music.mp3" type="audio/mpeg">
</audio>

<script>
// Typing
const text = "There’s something about you... I can’t explain it, but I feel it every second ❤️";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}
typing();

// Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

// Experience
function startExperience() {
    const heartbeat = document.getElementById("heartbeat");
    const music = document.getElementById("bgMusic");

    heartbeat.play();

    setTimeout(() => {
        music.volume = 0;
        music.play();

        let vol = 0;
        const fade = setInterval(() => {
            if (vol < 1) {
                vol += 0.05;
                music.volume = vol;
            } else clearInterval(fade);
        }, 200);
    }, 2000);

    document.getElementById("popup").classList.add("active");
}

// Music Toggle
function toggleMusic() {
    const music = document.getElementById("bgMusic");

    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}
</script>

</body>
</html>
