```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Someone Special ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      padding: 20px;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.5rem;
      line-height: 1.6;
      animation: fadeIn 2s ease-in-out;
    }

    .heart {
      font-size: 40px;
      margin-top: 20px;
      animation: beat 1s infinite;
    }

    .tap {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @keyframes beat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>
      “You are the finest, loveliest, and most beautiful soul I’ve ever known…
      and honestly, even those words fall short of what you truly are to me.”
    </h1>

    <div class="heart">❤️</div>
  </div>

  <div class="tap">Tap anywhere 💓</div>

  <!-- Audio -->
  <audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <audio id="heartbeat" loop>
    <source src="heartbeat.mp3" type="audio/mpeg">
  </audio>

  <script>
    let started = false;

    function startAudio() {
      if (!started) {
        const music = document.getElementById("bg-music");
        const beat = document.getElementById("heartbeat");

        music.volume = 0.5;
        beat.volume = 0.8;

        music.play().catch(() => {});
        beat.play().catch(() => {});

        started = true;
      }
    }

    // Works on mobile + desktop
    document.addEventListener("click", startAudio);
    document.addEventListener("touchstart", startAudio);
  </script>

</body>
</html>
```
