<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Jayshri</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(180deg, #0f172a, #1e1b4b);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

/* 🌙 Moon */
.moon {
    position: absolute;
    top: 60px;
    right: 80px;
    width: 90px;
    height: 90px;
    background: radial-gradient(circle, #fff, #ddd);
    border-radius: 50%;
    box-shadow: 0 0 40px #fff;
}

/* ⭐ Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.8;
    animation: twinkle 2s infinite ease-in-out;
}

@keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* 🌠 Shooting star */
.shooting-star {
    position: absolute;
    width: 100px;
    height: 2px;
    background: linear-gradient(-45deg, white, transparent);
    opacity: 0;
    animation: shoot 6s infinite;
}

@keyframes shoot {
    0% { transform: translateX(0) translateY(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateX(-500px) translateY(200px); opacity: 0; }
}

/* 💎 Card */
.card {
    width: 90%;
    max-width: 520px;
    padding: 40px;
    border-radius: 30px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    text-align: center;
    box-shadow: 0 0 50px rgba(255,255,255,0.1);
    z-index: 2;
}

h1 {
    font-size: 2.5em;
    color: #f9a8d4;
}

#typing {
    font-size: 1.2em;
    margin: 20px 0;
    min-height: 70px;
}

/* Button */
button {
    padding: 14px 30px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(45deg, #ec4899, #8b5cf6);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ec4899;
}

/* Music Button */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: white;
    color: #ec4899;
}

/* Popup */
.popup {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    height: 60%;
    background: #0b1220;
    border-radius: 30px 30px 0 0;
    padding: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: 0.6s;
    z-index: 10;
}

.popup.active {
    bottom: 0;
}

.popup p {
    max-width: 500px;
    font-size: 1.2em;
    line-height: 1.7;
    color: #f9a8d4;
}
</style>
</head>

<body>

<div class="moon"></div>

<script>
// stars
for (let i = 0; i < 80; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(star);
}

// shooting star
let shoot = document.createElement("div");
shoot.className = "shooting-star";
shoot.style.top = "20%";
shoot.style.right = "10%";
document.body.appendChild(shoot);
</script>

<div class="card">
    <h1>Hey Jayshri</h1>
    <p id="typing"></p>
    <button onclick="startExperience()">Yaha Click Kro</button>
</div>

<div class="popup" id="popup">
    <p>
        Coffee peene chale kya?
        <br><br>
       
    </p>
</div>

<button class="music-btn" onclick="toggleMusic()" id="musicBtn">🎵 Play</button>

<audio id="bgMusic" loop>
    <source src="Musical.mp3" type="audio/mpeg">
</audio>

<script>
// typing
const text = "Kya kar rahi ho";
let i = 0;
function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}
typing();

// start
function startExperience() {
    const music = document.getElementById("bgMusic");
    music.play();
    document.getElementById("popup").classList.add("active");
    document.getElementById("musicBtn").innerText = "⏸ Pause";
}

// toggle music
function toggleMusic() {
    const music = document.getElementById("bgMusic");
    const btn = document.getElementById("musicBtn");

    if (music.paused) {
        music.play();
        btn.innerText = "⏸ Pause";
    } else {
        music.pause();
        btn.innerText = "🎵 Play";
    }
}
</script>

</body>
</html>
