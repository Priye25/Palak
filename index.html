```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Someone Special ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 800px;
      padding: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.5rem;
      line-height: 1.5;
      animation: floatText 4s ease-in-out infinite;
    }

    .heart {
      font-size: 40px;
      animation: heartbeat 1.2s infinite;
      margin-top: 20px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.2); }
      50% { transform: scale(1); }
      75% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .tap-note {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>
      “You are the finest, loveliest, and most beautiful soul I’ve ever known… 
      and honestly, even those words fall short of what you truly are to me.”
    </h1>

    <div class="heart">❤️</div>
  </div>

  <div class="tap-note">Tap anywhere 💓</div>

  <!-- Background Music -->
  <audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <!-- Heartbeat Sound -->
  <audio id="heartbeat-sound" loop>
    <source src="heartbeat.mp3" type="audio/mpeg">
  </audio>

  <script>
    let started = false;

    document.addEventListener("click", function () {
      if (!started) {
        document.getElementById("bg-music").play();
        document.getElementById("heartbeat-sound").play();
        started = true;
      }
    });
  </script>

</body>
</html>
```
