<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Palak ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(180deg, #0f172a, #1e1b4b, #312e81);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

/* 🌙 Moon */
.moon {
    position: absolute;
    top: 80px;
    right: 80px;
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, #fff, #ddd);
    border-radius: 50%;
    box-shadow: 0 0 40px #fff;
}

/* ⭐ Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite ease-in-out;
}

@keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* 💎 Card */
.card {
    width: 90%;
    max-width: 520px;
    padding: 40px;
    border-radius: 30px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    text-align: center;
    box-shadow: 0 0 50px rgba(255,255,255,0.1);
    z-index: 2;
}

h1 {
    font-size: 2.5em;
    color: #f9a8d4;
    margin-bottom: 15px;
}

#typing {
    font-size: 1.2em;
    margin: 20px 0;
    min-height: 70px;
}

/* Button */
button {
    padding: 14px 30px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(45deg, #ec4899, #8b5cf6);
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 1em;
    margin: 10px;
}

/* Music Button */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: white;
    color: #ec4899;
}

/* Popup */
.popup {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    height: 60%;
    background: #111827;
    border-radius: 30px 30px 0 0;
    padding: 30px;
    text-align: center;
    transition: 0.6s;
    color: #f9a8d4;
}

.popup.active {
    bottom: 0;
}

.popup p {
    font-size: 1.2em;
    line-height: 1.6;
}
</style>
</head>

<body>

<!-- 🌙 Moon -->
<div class="moon"></div>

<!-- ⭐ Stars -->
<script>
for (let i = 0; i < 80; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = (Math.random() * 3 + 1) + "s";
    document.body.appendChild(star);
}
</script>

<!-- 💎 Card -->
<div class="card">
    <h1>Palak Mera Bachha ❤️</h1>
    <p id="typing"></p>
    <button onclick="startExperience()">Babu Yaha Click Kro 💖</button>
</div>

<!-- 💌 Popup -->
<div class="popup" id="popup">
    <p>
        You are the finest, loveliest, and most beautiful soul I’ve ever known… and honestly, even those words fall short of what you truly are to me ❤️
        <br><br>
        Aur tum mere liye bahut zaruri ho… I feel nothing without you.  
        You are my happy charm 💖
    </p>
</div>

<!-- 🎵 Music Button -->
<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<!-- 🎶 Music -->
<audio id="bgMusic" loop>
    <source src="Music.mp3" type="audio/mpeg">
</audio>

<script>
// Typing
const text = "There’s something about you... I can’t explain it, but I feel it every second ❤️";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}
typing();

// Start
function startExperience() {
    const music = document.getElementById("bgMusic");
    music.play();
    document.getElementById("popup").classList.add("active");
}

// Music toggle
function toggleMusic() {
    const music = document.getElementById("bgMusic");
    if (music.paused) music.play();
    else music.pause();
}
</script>

</body>
</html>
