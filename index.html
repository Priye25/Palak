<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Palak ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #1a001f, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

body::before {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: #ff2e8a;
    filter: blur(150px);
    top: 10%;
    left: 20%;
}

.card {
    width: 90%;
    max-width: 380px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    text-align: center;
    box-shadow: 0 0 40px rgba(255, 46, 138, 0.3);
    animation: fadeIn 1.5s ease;
}

h1 {
    font-size: 2em;
    background: linear-gradient(90deg, #fff, #ff7eb3, #fff);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s infinite;
}

@keyframes shimmer {
    0% { background-position: -200%; }
    100% { background-position: 200%; }
}

#typing {
    font-size: 1.05em;
    margin: 15px 0;
    min-height: 60px;
    opacity: 0.9;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff2e8a, #ff7eb3);
    color: white;
    font-weight: bold;
    cursor: pointer;
    animation: pulse 1.8s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,46,138,0.6); }
    70% { box-shadow: 0 0 0 20px rgba(255,46,138,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,46,138,0); }
}

.popup {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    height: 65%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
    border-radius: 30px 30px 0 0;
    padding: 25px;
    text-align: center;
    transition: 0.6s ease;
}

.popup.active {
    bottom: 0;
}

.popup h2 {
    color: #ff7eb3;
    margin-bottom: 10px;
}

.popup p {
    font-size: 1.1em;
    line-height: 1.5;
}

.close {
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff2e8a;
    border-radius: 20px;
}

.heart {
    position: absolute;
    font-size: 14px;
    animation: floatUp 6s linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">
    <h1>Hi Palak ❤️</h1>
    <p id="typing"></p>
    <button onclick="startExperience()">Feel My Heart 💖</button>
</div>

<div class="popup" id="popup">
    <h2>For You 💌</h2>
    <p>
        You are the finest, loveliest, and most beautiful soul I’ve ever known… and honestly, even those words fall short of what you truly are to me ❤️
    </p>
    <button class="close" onclick="closePopup()">Close</button>
</div>

<!-- Audio -->
<audio id="heartbeat">
    <source src="heartbeat.mp3" type="audio/mpeg">
</audio>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const text = "There’s something about you... I can’t explain it, but I feel it every second ❤️";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}
typing();

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

function startExperience() {
    const heartbeat = document.getElementById("heartbeat");
    const music = document.getElementById("bgMusic");

    heartbeat.play();

    setTimeout(() => {
        music.volume = 0;
        music.play();

        let vol = 0;
        const fade = setInterval(() => {
            if (vol < 1) {
                vol += 0.05;
                music.volume = vol;
            } else clearInterval(fade);
        }, 200);
    }, 3000);

    document.getElementById("popup").classList.add("active");
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
